backend:
  name: github
  repo: gregorieffm/cage-aux-oiseaux
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: site-content
    label: "Contenu du site"
    files:
      - name: site-content
        label: "Textes du site"
        file: src/content/sections/site-content.json
        fields:
          - label: "Accueil (Hero)"
            name: hero
            widget: object
            fields:
              - { label: Sous-titre, name: subtitle, widget: string }
              - { label: Titre principal, name: title, widget: string }
              - { label: Accroche, name: tagline, widget: text }
              - { label: "Bouton (texte)", name: cta, widget: string }

          - label: "Le Domaine"
            name: domaine
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Titre, name: title, widget: string }
              - label: Paragraphes
                name: paragraphs
                widget: list
                field: { label: Paragraphe, name: paragraph, widget: text }

          - label: "Spa & Bien-être"
            name: spa
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Titre, name: title, widget: string }
              - label: Paragraphes
                name: paragraphs
                widget: list
                field: { label: Paragraphe, name: paragraph, widget: text }
              - label: "Options bien-être"
                name: options
                widget: list
                fields:
                  - { label: Nom, name: name, widget: string }
                  - { label: Description, name: description, widget: string }
                  - { label: Tarif, name: price, widget: string, required: false }

          - label: "Atelier & Galerie"
            name: atelier
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Titre, name: title, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - label: "Texte galerie"
                name: galleryText
                widget: list
                field: { label: Paragraphe, name: paragraph, widget: text }
              - { label: "Titre déco", name: decoTitle, widget: string }
              - { label: "Description déco", name: decoDescription, widget: string }

          - label: "Stages de céramique"
            name: stages
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Titre, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Formules
                name: formulas
                widget: list
                fields:
                  - { label: Nom, name: name, widget: string }
                  - { label: Horaires, name: hours, widget: string }
                  - { label: Prix, name: price, widget: string }
                  - { label: Note, name: note, widget: string }

          - label: "Avis clients"
            name: reviews
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Titre, name: title, widget: string }
              - { label: Sous-titre, name: subtitle, widget: string }
              - label: Avis
                name: items
                widget: list
                fields:
                  - { label: Texte, name: text, widget: text }
                  - { label: Auteur, name: author, widget: string }
                  - { label: "Note (1-5)", name: rating, widget: number, value_type: int, min: 1, max: 5 }

          - label: "Contact"
            name: contact
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Titre, name: title, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - label: Adresse
                name: address
                widget: list
                field: { label: Ligne, name: line, widget: string }
              - { label: Téléphone, name: phone, widget: string, required: false }
              - { label: Email, name: email, widget: string, required: false }
              - { label: "Lien Facebook", name: facebook, widget: string, required: false }

          - label: "Localisation"
            name: location
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Titre, name: title, widget: string }
              - label: Adresse
                name: address
                widget: list
                field: { label: Ligne, name: line, widget: string }
              - label: "À proximité"
                name: nearby
                widget: list
                field: { label: Lieu, name: place, widget: string }

  - name: properties
    label: "Hébergements"
    folder: src/content/properties
    format: json
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Nom, name: name, widget: string }
      - { label: "Slug (URL)", name: slug, widget: string }
      - { label: "Ordre d'affichage", name: order, widget: number, value_type: int }
      - { label: "Coup de coeur (mise en avant)", name: featured, widget: boolean, default: false, hint: "Activez pour afficher cet hébergement en grand sur la page d'accueil" }
      - { label: "Badge affiché", name: badge, widget: string, required: false, hint: "Ex: Coup de coeur, Nouveau, Promo..." }
      - { label: Capacité, name: capacity, widget: string }
      - { label: Description, name: description, widget: text }
      - label: Caractéristiques
        name: features
        widget: list
        field: { label: Feature, name: feature, widget: string }
      - { label: "Prix affiché", name: price, widget: string, required: false }
      - { label: "Photo principale", name: image, widget: image, required: false }
      - label: "Galerie photos"
        name: gallery
        widget: list
        field: { label: Photo, name: photo, widget: image }

  - name: extras
    label: "Options & Extras"
    folder: src/content/extras
    format: json
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Nom, name: name, widget: string }
      - { label: Prix, name: price, widget: string }
      - { label: Icône, name: icon, widget: string }
      - { label: Ordre, name: order, widget: number, value_type: int }
